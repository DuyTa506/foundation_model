stage: sft
do_train: true
model_name_or_path: ByteDance/Ouro-1.4B
template: empty
dataset_dir: ./data
dataset: open_thoughts3,ace_reason_sft,open_code_reasoning,deepwriting20k
cutoff_len: 32768
