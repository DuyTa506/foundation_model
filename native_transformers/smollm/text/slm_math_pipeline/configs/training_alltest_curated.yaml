# Smoke train on the curated .ds shards produced by the FULL 00->07 chain over ALL
# 12 real sources (outputs/_alltest/tok). Proves the curated output is trainable end
# to end: datatrove .ds -> PackedTokenDataset -> healthy decreasing loss.
# GTX 1650 Ti (Turing): fp16 only. Tiny model, vocab 64000 (token ids <40175 valid).
version: 1

run:
  name: alltest_curated
  output_dir: outputs/_alltest/train
  seed: 42
  resume_from_checkpoint: null

hardware:
  gpus_per_node: 1
  num_nodes: 1
  gpu_type: any
  precision: fp16

model:
  config_path: configs/model_tiny_smoke.yaml
  init_checkpoint: outputs/model_smoke_init

data:
  tokenized_shards_dir: outputs/_alltest/tok
  max_seq_length: 512
  packing: true

optimization:
  peak_learning_rate: 3.0e-4
  min_learning_rate: 3.0e-5
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0

scheduler:
  type: warmup_stable_decay
  warmup_steps: 5
  stable_steps: null
  decay_steps: 5
  decay_half_life_steps: 2
  decay_phase_data_mix: false

training:
  micro_batch_size: 4
  gradient_accumulation_steps: 1
  total_steps: 30
  logging_steps: 2
  save_steps: 1000
  eval_steps: 1000
  fp16: true
  gradient_checkpointing: false

parallelism:
  strategy: none

checkpointing:
  save_total_limit: 1
  load_optimizer_state: true
  load_scheduler_state: true

logging:
  report_to: none
  log_tokens_per_sec: true

health_monitor:
  spike_factor: 1.5
  ema_alpha: 0.1
  plateau_window: 100
  plateau_min_delta: 0.01
  vanish_thresh: 1.0e-4
  explode_thresh: 100.0
