run:
  name: minicpm5_1b_en_vi_math_sft
  output_dir: outputs/finetune
  seed: 42

model:
  model_id: openbmb/MiniCPM5-1B
  tokenizer_id: openbmb/MiniCPM5-1B
  trust_remote_code: true
  use_bnb_4bit: false

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

training:
  max_seq_length: 4096
  max_steps: 30000
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_steps: 500
  weight_decay: 0.01
  logging_steps: 10
  save_steps: 500
  bf16: true
  report_to: wandb

data:
  manifest_path: outputs/finetune_manifest/finetune_manifest.jsonl
  prompt_field: prompt
  response_field: response
  strip_think_tags: true
