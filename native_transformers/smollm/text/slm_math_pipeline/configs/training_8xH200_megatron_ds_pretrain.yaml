run:
  name: minicpm5_1b_en_vi_math_pretrain
  output_dir: outputs/pretrain
  seed: 42

hardware:
  gpus_per_node: 8
  num_nodes: 1
  gpu_type: H200
  precision: bf16

model:
  base_model: openbmb/MiniCPM5-1B
  tokenizer: openbmb/MiniCPM5-1B
  seq_length: 4096
  trust_remote_code: true

parallelism:
  tensor_parallel_size: 2
  pipeline_parallel_size: 1
  data_parallel_size: 4
  gradient_accumulation_steps: 8

optimization:
  micro_batch_size: 1
  global_batch_tokens: 2097152
  train_steps: 200000
  learning_rate: 2.0e-4
  min_lr: 2.0e-5
  warmup_steps: 2000
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  grad_clip: 1.0
  lr_scheduler: cosine

checkpointing:
  save_interval: 1000
  keep_last_n: 5
  load_optimizer_state: true
  load_scheduler_state: true

deepspeed:
  zero_stage: 1
  overlap_comm: true
  contiguous_gradients: true
  gradient_clipping: 1.0

data:
  manifest_path: outputs/pretrain_manifest/dataset_manifest_lang_dedup.jsonl
  indexed_dataset_prefix: outputs/pretrain_data/en_vi_math

launcher:
  torchrun:
    nproc_per_node: 8
    master_port: 29501
  env:
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    NCCL_DEBUG: WARN
