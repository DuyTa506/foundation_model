# Long-context extension Phase 2: 16k -> 32k via ABF (rope_theta already = 5e6)
# Run AFTER 16k extension is validated (outputs/pretrain_16k).
# A short continued-pretraining run with longer sequences and long-doc data.
version: 1

run:
  name: llama_1b_en_vi_longctx_32k
  output_dir: outputs/pretrain_32k
  seed: 42
  resume_from_checkpoint: outputs/pretrain_16k

hardware:
  gpus_per_node: 4
  gpu_type: H200
  precision: bf16

model:
  config_path: configs/model_llama_1b_en_vi.yaml
  init_checkpoint: outputs/pretrain_16k
  # rope_theta=5e6 already handles 32k without additional scaling.
  # ABF: no rope_scaling needed at 8x extension with this theta.
  rope_scaling: null

data:
  tokenized_shards_dir: outputs/curated/tokenized_32k   # long-doc shards (see below)
  max_seq_length: 32768
  packing: true

# Long-context data requirements (re-tokenize with max_seq_length=32768):
# - Books (Project Gutenberg, books_vi, legal documents)
# - allenai/peS2o (long academic papers)
# - Concatenated multi-doc packs (3-5 docs joined with EOS)
# - Long Vietnamese Wikipedia articles
# - Synthetic needle/key-retrieval tasks (multi-doc QA)
# VI-first tilt maintained (~60% VI long docs).
long_context_data:
  sources:
    - id: vi_books
      hf_dataset: null  # source long VI books/legal; see docs for community sources
      language: vi
      weight: 0.30
    - id: vi_wikipedia_long
      hf_dataset: wikimedia/wikipedia
      subset: 20231101.vi
      language: vi
      weight: 0.20
    - id: pes2o
      hf_dataset: allenai/peS2o
      language: en
      weight: 0.25
    - id: en_books
      hf_dataset: pg19
      language: en
      weight: 0.15
    - id: synth_longctx
      hf_dataset: null  # synthetic multi-doc QA / needle tasks
      weight: 0.10

optimization:
  peak_learning_rate: 3.0e-5   # 10x lower than base (fine-tuning RoPE positions)
  min_learning_rate: 3.0e-6
  adam_beta1: 0.9
  adam_beta2: 0.95
  weight_decay: 0.1
  grad_clip: 1.0

scheduler:
  type: warmup_stable_decay
  warmup_steps: 100
  stable_steps: 400
  decay_steps: 500             # short run: ~1B tokens total at 2M tok/step

training:
  micro_batch_size: 1          # 32k seq is memory-intensive
  gradient_accumulation_steps: 128
  # 4 GPU:  1 * 128 * 4 * 32768 = 16,777,216 ≈ 16M tokens/step
  # 8 GPU:  1 *  64 * 8 * 32768 = 16,777,216  (grad_accum=64)
  total_steps: 1000            # ~2–4B tokens total; short CPT
  logging_steps: 10
  save_steps: 200
  bf16: true
  gradient_checkpointing: true  # enable at 32k to save memory

parallelism:
  strategy: fsdp
  fsdp:
    sharding_strategy: FULL_SHARD
    mixed_precision: bf16
    activation_checkpointing: true

checkpointing:
  save_total_limit: 3

# Validation: RULER + needle-in-a-haystack at 32k before proceeding to 64k.
eval:
  after_training: true
  tasks:
    - ruler_32k
    - needle_32k
