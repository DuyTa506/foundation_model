# Base pretraining config: HF Trainer + accelerate/FSDP, from scratch, seq=4096.
# Model is loaded from outputs/model_init (random init, NOT from_pretrained).
# WSD scheduler: Warmup -> Stable -> Exponential Decay (~MiniCPM recipe).
#
# GPU count: set gpus_per_node below, or override at launch time:
#   bash scripts/launch_pretrain_hf.sh --config ... --gpus 4   # 4 GPUs
#   bash scripts/launch_pretrain_hf.sh --config ... --gpus 6   # 6 GPUs
# global_batch_tokens scales automatically with GPU count.
version: 1

run:
  name: llama_1b_en_vi_base_pretrain
  output_dir: outputs/pretrain
  seed: 42
  resume_from_checkpoint: null  # set to checkpoint path to resume

hardware:
  gpus_per_node: 4             # set to actual GPU count (4/5/6/7/8)
  num_nodes: 1
  gpu_type: H200
  precision: bf16
  # To select specific GPU IDs (e.g. when others are busy):
  #   bash scripts/launch_pretrain_hf.sh --config ... --gpu_ids 4,5,6,7

model:
  config_path: configs/model_llama_1b_en_vi.yaml   # architecture config
  init_checkpoint: outputs/model_init              # from init_model_from_scratch.py
  attn_implementation: flash_attention_2            # flash-attn installed; faster + lower mem than sdpa
  # rope_scaling: null for base training (4096 context)

data:
  tokenized_shards_dir: outputs/curated/tokenized
  max_seq_length: 4096
  packing: true                # packed, no padding (shards pre-packed by 07_tokenize_pack.py)
  dataloader_num_workers: 1    # PackedTokenDataset wraps to 1 HF shard; >1 is wasted
  # Train-time de-clustering (shards are ~1 GB and written ~one source at a time;
  # reading them in order gives a sawtooth/regime-block loss as the distribution
  # switches). At ~104B tokens this is ~1 epoch, so read order IS the curriculum.
  #   shard_interleave: read all shards concurrently, drawing each sequence from a
  #     random live shard — dissolves within-shard single-source runs (the buffer
  #     alone can't, since one 1B shard dwarfs it) and keeps source mix ~proportional
  #     to token counts. This is the important knob; leave on.
  #   shuffle_buffer_size: reservoir buffer for local permutation (8192 seqs × 4096
  #     ≈ 33M tokens in flight). shuffle_shards: per-epoch reshuffle of draw order.
  shard_interleave: true
  shuffle_shards: true
  shuffle_buffer_size: 8192
  # WSD decay-phase anneal (DEFAULT ON): during the LR-decay phase, stream from this
  # high-quality VI+math shard set instead of the broad mix. Build it FIRST with:
  #   python scripts/data/build_decay_shards.py --tokenizer_path outputs/tokenizer \
  #     --output_dir outputs/curated/tokenized_decay
  # If the dir is missing/empty the trainer warns and falls back to the broad mix
  # (no crash). Requires scheduler.decay_phase_data_mix (also on by default).
  decay_shards_dir: outputs/curated/tokenized_decay
  # Held-out eval set → real val loss (logged as eval_loss) (DEFAULT ON). Build a
  # small source-stratified val set FIRST with:
  #   python scripts/data/build_val_shard.py --tokenizer_path outputs/tokenizer \
  #     --output_dir outputs/curated/val --val_tokens 16000000
  # Missing/empty dir → trainer warns and reports train loss only (no crash).
  val_shards_dir: outputs/curated/val
  eval_max_sequences: 2000     # hard cap per eval so it stays fast + comparable
  # Per-domain eval (optional, overrides val_shards_dir): logs a SEPARATE
  # eval/<name>_loss so a rising eval loss can be traced to the domain that's
  # actually regressing (a single blended number can't). Build each held-out dir:
  #   python scripts/data/build_val_shard.py --sources fineweb2_hq_vi c4_vi vi_curated \
  #     --output_dir outputs/curated/val_vi   --val_tokens 40000000
  #   python scripts/data/build_val_shard.py --sources finemath_4plus open_web_math ultradata_math \
  #     --output_dir outputs/curated/val_math --val_tokens 40000000
  #   python scripts/data/build_val_shard.py --sources fineweb_edu pes2o \
  #     --output_dir outputs/curated/val_sci  --val_tokens 40000000
  # val_domains:
  #   vi:      outputs/curated/val_vi
  #   en_math: outputs/curated/val_math
  #   en_sci:  outputs/curated/val_sci

# ── Optimizer ────────────────────────────────────────────────────────────────
optimization:
  peak_learning_rate: 4.0e-4   # was 3e-4; notes §4 cite 1e-4–6e-4 for sub-2B (Qwen-1.8B=6e-4).
                               # 4e-4 is a safe step up for a deeper 32-layer net; after a
                               # stable smoke/early run you can push toward 5–6e-4.
  min_learning_rate: 4.0e-5    # ~10% of peak at end of decay
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0

# ── WSD LR Scheduler ─────────────────────────────────────────────────────────
# Warmup-Stable-Decay :
#   - Warmup: linear ramp to peak_learning_rate
#   - Stable: constant at peak_learning_rate
#   - Decay: exponential  f(s) = 0.5^((s - stable_end_step) / decay_half_life_steps)
scheduler:
  type: warmup_stable_decay    # custom scheduler in scripts/pretrain_hf.py
  warmup_steps: 1000
  stable_steps: null           # auto: total_steps - warmup_steps - decay_steps (=41000)
  decay_steps: 8000            # ~16% of 50k (MiniCPM4 used 1.3T/8.3T≈16%); was 5000
  decay_half_life_steps: 2400  # T tuned so 0.5^(8000/T)≈min/peak=0.1 → LR glides to
                               # min across the whole decay phase instead of bottoming
                               # out early and sitting flat. (was 1250)
  # At the start of decay phase, the data mix switches to the vi_dominant decay mix
  # defined in curation_pipeline.yaml:decay_phase_mix.
  decay_phase_data_mix: true

# ── Batch / steps ─────────────────────────────────────────────────────────────
training:
  micro_batch_size: 12         # per GPU; verified safe on 4×H200 with bf16+FA2
  gradient_accumulation_steps: 11
  # global_batch_tokens = micro_batch * grad_accum * num_gpus * seq_len
  # 4 GPU: 12 * 11 * 4 * 4096 = 2,162,688 ≈ 2.16M tokens/step  ✓
  # 8 GPU: 12 *  6 * 8 * 4096 = 2,359,296 ≈ 2.36M tokens/step  (grad_accum=6)
  total_steps: 50000           # 50k × 2.16M = ~108B seen ≈ 1 epoch over the ~104B corpus
  # DATA BUDGET: full 00–07 curation ≈ 104B tokens, so this is ~a single pass — which
  # is why ordering (shard_interleave + decay anneal above) matters: read order IS the
  # curriculum. Sanity-check by watching when `epoch` first crosses 1.0 (~step 48k).
  logging_steps: 10
  save_steps: 1000
  eval_steps: 5000
  bf16: true
  gradient_checkpointing: false  # H200 + 1B model + FA2: no OOM risk at seq=4096
  torch_compile: false           # set true for ~15% speedup; may conflict with FSDP on some builds
  auto_batch_size: false         # keep false; batch hardcoded above after empirical tuning

# ── Parallelism (FSDP or DeepSpeed ZeRO-2 via accelerate) ───────────────────
parallelism:
  strategy: fsdp              # or: deepspeed_zero2
  fsdp:
    sharding_strategy: FULL_SHARD
    mixed_precision: bf16
    activation_checkpointing: false
    cpu_offload: false
  # DeepSpeed alternative (uncomment and set strategy: deepspeed_zero2)
  # deepspeed:
  #   zero_stage: 2
  #   overlap_comm: true
  #   contiguous_gradients: true

checkpointing:
  save_total_limit: 5
  load_optimizer_state: true
  load_scheduler_state: true

logging:
  report_to: wandb              # options: wandb | tensorboard | none (comma-sep for both)
  wandb_project: slm_math_vi
  wandb_run_name: llama_1b_en_vi_pretrain
  log_tokens_per_sec: true     # critical throughput metric

health_monitor:
  spike_factor: 1.5            # warn if loss > ema × 1.5
  ema_alpha: 0.05              # slower EMA for long runs
  plateau_window: 200          # ~1k steps of no progress triggers warning
  plateau_min_delta: 0.005
  vanish_thresh: 1.0e-4
  explode_thresh: 100.0
