# Base pretraining config: HF Trainer + accelerate/FSDP, from scratch, seq=4096
# Replaces training_8xH200_megatron_ds_pretrain.yaml (deprecated).
# Model is loaded from outputs/model_init (random init, NOT from_pretrained).
# WSD scheduler: Warmup -> Stable -> Exponential Decay (~MiniCPM recipe).
version: 1

run:
  name: llama_1b_en_vi_base_pretrain
  output_dir: outputs/pretrain
  seed: 42
  resume_from_checkpoint: null  # set to checkpoint path to resume

hardware:
  gpus_per_node: 8
  num_nodes: 1
  gpu_type: H200
  precision: bf16

model:
  config_path: configs/model_llama_1b_en_vi.yaml   # architecture config
  init_checkpoint: outputs/model_init              # from init_model_from_scratch.py
  # rope_scaling: null for base training (4096 context)

data:
  tokenized_shards_dir: outputs/curated/tokenized
  max_seq_length: 4096
  packing: true                # packed, no padding (shards pre-packed by 07_tokenize_pack.py)

# ── Optimizer ────────────────────────────────────────────────────────────────
optimization:
  peak_learning_rate: 3.0e-4
  min_learning_rate: 3.0e-5    # ~10% of peak at end of decay
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0

# ── WSD LR Scheduler ─────────────────────────────────────────────────────────
# Warmup-Stable-Decay :
#   - Warmup: linear ramp to peak_learning_rate
#   - Stable: constant at peak_learning_rate
#   - Decay: exponential  f(s) = 0.5^((s - stable_end_step) / decay_half_life_steps)
scheduler:
  type: warmup_stable_decay    # custom scheduler in scripts/pretrain_hf.py
  warmup_steps: 1000
  stable_steps: null           # auto: total_steps - warmup_steps - decay_steps
  decay_steps: 5000            # ~10% of 50k total steps
  decay_half_life_steps: 1250  # T in MiniCPM formula (~2.5B tokens at 2M tok/step)
  # At the start of decay phase, the data mix switches to the vi_dominant decay mix
  # defined in curation_pipeline.yaml:decay_phase_mix.
  decay_phase_data_mix: true

# ── Batch / steps ─────────────────────────────────────────────────────────────
training:
  micro_batch_size: 8          # per GPU; tune to fill H200 VRAM at seq=4096
  gradient_accumulation_steps: 8
  # global_batch_tokens ≈ micro_batch * grad_accum * num_gpus * seq_len
  # = 8 * 8 * 8 * 4096 = 2,097,152 ≈ 2M tokens/step  ✓
  total_steps: 50000           # ~100B tokens at 2M tok/step
  logging_steps: 10
  save_steps: 1000
  eval_steps: 5000
  bf16: true
  gradient_checkpointing: false  # H200 + 1B model unlikely to OOM at seq=4096

# ── Parallelism (FSDP or DeepSpeed ZeRO-2 via accelerate) ───────────────────
parallelism:
  strategy: fsdp              # or: deepspeed_zero2
  fsdp:
    sharding_strategy: FULL_SHARD
    mixed_precision: bf16
    activation_checkpointing: false
    cpu_offload: false
  # DeepSpeed alternative (uncomment and set strategy: deepspeed_zero2)
  # deepspeed:
  #   zero_stage: 2
  #   overlap_comm: true
  #   contiguous_gradients: true

checkpointing:
  save_total_limit: 5
  load_optimizer_state: true
  load_scheduler_state: true

logging:
  report_to: wandb
  log_tokens_per_sec: true     # critical throughput metric
