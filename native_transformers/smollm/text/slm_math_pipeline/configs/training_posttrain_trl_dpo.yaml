# DPO post-training config — optional style/safety alignment pass after GRPO.
# Points at the from-scratch model + new tokenizer (NOT openbmb/MiniCPM5-1B).
# Run AFTER GRPO: model_id = outputs/rl.
version: 1

run:
  name: llama_1b_en_vi_dpo_style
  output_dir: outputs/posttrain
  seed: 42

model:
  model_id: outputs/rl          # from GRPO checkpoint (or outputs/finetune for DPO-only)
  tokenizer_id: outputs/tokenizer
  trust_remote_code: false

mode:
  preferred: dpo
  fallback: sft

dpo:
  beta: 0.1
  max_length: 4096
  max_prompt_length: 2048
  learning_rate: 5.0e-6
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  max_steps: 5000
  warmup_steps: 100
  logging_steps: 10
  save_steps: 500
  bf16: true

sft_fallback:
  max_seq_length: 4096
  learning_rate: 1.0e-5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16
  max_steps: 5000
  warmup_steps: 100
  logging_steps: 10
  save_steps: 500
  bf16: true

data:
  preference_manifest_path: outputs/posttrain_manifest/posttrain_preference_manifest.jsonl
  sft_manifest_path: outputs/posttrain_manifest/posttrain_sft_manifest.jsonl
  # Per-sample mode: DPO pairs keep their think/no_think mode field
  # strip_think_tags is REMOVED — behavior controlled by mode field
  strip_think_tags: false
