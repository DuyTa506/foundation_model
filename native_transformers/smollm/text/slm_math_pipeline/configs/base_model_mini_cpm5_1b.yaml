model:
  name_or_path: openbmb/MiniCPM5-1B
  tokenizer_name_or_path: openbmb/MiniCPM5-1B
  architecture_hint: llama_like
  trust_remote_code: true
  dtype: bfloat16

compatibility_checks:
  verify_hf_config: true
  require_causal_lm: true
  allowed_model_types:
    - llama
    - minicpm
  min_vocab_size: 32000
  max_supported_sequence_length: 32768
  require_tokenizer_files:
    - tokenizer.json

export:
  save_resolved_config: true
  output_file: outputs/model_compatibility/model_info.json
