# Extended smoke-test config: single GPU, 4GB VRAM, 2k steps.
# Purpose: validate loss curve + gradient health before scaling to cluster.
# Uses tiny ~20M model. NOT for production — use training_8xH200_hf_pretrain.yaml.
version: 1

run:
  name: smoke_test
  output_dir: outputs/smoke_train
  seed: 42
  resume_from_checkpoint: null

hardware:
  gpus_per_node: 1
  num_nodes: 1
  gpu_type: any
  precision: fp16              # fp16 works on any GPU; change to bf16 for Ampere+

model:
  config_path: configs/model_tiny_smoke.yaml
  init_checkpoint: outputs/model_smoke_init

data:
  tokenized_shards_dir: outputs/smoke_tokenized
  max_seq_length: 512
  packing: true

optimization:
  peak_learning_rate: 3.0e-4
  min_learning_rate: 3.0e-5
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  weight_decay: 0.1
  grad_clip: 1.0

scheduler:
  type: warmup_stable_decay
  warmup_steps: 5
  stable_steps: null           # auto
  decay_steps: 5
  decay_half_life_steps: 2
  decay_phase_data_mix: false  # disable for smoke test

training:
  micro_batch_size: 4
  gradient_accumulation_steps: 1
  total_steps: 2000
  logging_steps: 10
  save_steps: 1000
  eval_steps: 1000
  fp16: true
  gradient_checkpointing: false

parallelism:
  strategy: none               # single GPU — no FSDP/DeepSpeed

checkpointing:
  save_total_limit: 2
  load_optimizer_state: true
  load_scheduler_state: true

logging:
  report_to: none              # no wandb for smoke test
  log_tokens_per_sec: true

health_monitor:
  spike_factor: 1.5            # warn if loss > ema × 1.5
  ema_alpha: 0.1
  plateau_window: 100          # warn if no improvement over 100 log steps
  plateau_min_delta: 0.01
  vanish_thresh: 1.0e-4        # grad_norm below → vanishing
  explode_thresh: 100.0        # grad_norm above → exploding
